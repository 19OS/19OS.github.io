<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>19OS</title>
  <link rel="stylesheet" href="CSS/main.css">
</head>

<body>
<div id="desktop">
<h2 class="title">19OS</h2>

<!-- Calculator -->
<div id="myApp" class="appwindow hidden">
  <div class="resize-handle resize-br"></div>
  <div class="resize-handle resize-r"></div>
  <div class="resize-handle resize-b"></div>
  <div class="window-titlebar">
    <span>Calculator</span>
    <div class="window-controls">
      <button class="closewin" data-target="myApp">×</button>
    </div>
  </div>
  <iframe src="Apps/com.calc.app/Index.html" class="window-content"></iframe>
</div>

<!-- Secret Lang -->
<div id="secret" class="appwindow hidden">
  <div class="resize-handle resize-br"></div>
  <div class="resize-handle resize-r"></div>
  <div class="resize-handle resize-b"></div>
  <div class="window-titlebar">
    <span>Secret Lang</span>
    <div class="window-controls">
      <button class="closewin" data-target="secret">×</button>
    </div>
  </div>
  <iframe src="Apps/com.os.secretlang/Index.html" class="window-content"></iframe>
</div>

<!-- Poki -->
<div id="poki" class="appwindow hidden">
  <div class="resize-handle resize-br"></div>
  <div class="resize-handle resize-r"></div>
  <div class="resize-handle resize-b"></div>
  <div class="window-titlebar">
    <span>Poki</span>
    <div class="window-controls">
      <button class="closewin" data-target="poki">×</button>
    </div>
  </div>
  <iframe src="https://poki.com/" class="window-content"></iframe>
</div>

<!-- Crash Viewer -->
<div id="crashViewer" class="appwindow hidden">
  <div class="resize-handle resize-br"></div>
  <div class="resize-handle resize-r"></div>
  <div class="resize-handle resize-b"></div>
  <div class="window-titlebar">
    <span>Crash Viewer</span>
    <div class="window-controls">
      <button class="closewin" data-target="crashViewer">×</button>
    </div>
  </div>
  <div id="crashList"></div>
  <button onclick="clearCrashes()">Clear Logs</button>
</div>

<!-- Dock -->
<div class="dock glass">
  <button onclick="openWindow('myApp')">Calculator</button>
  <button onclick="openWindow('secret')">Secret</button>
  <button onclick="openWindow('poki')">Poki</button>
  <button onclick="openWindow('crashViewer')">Crash</button>
</div>
</div>

<script>
// ===============================
// PREVENT PAGE RELOAD / NAVIGATION
// ===============================
let zIndexCounter = 100;
function bringToFront(el) {
  zIndexCounter++;
  el.style.zIndex = zIndexCounter;
}

// Disable F5, Ctrl+R, Cmd+R
document.addEventListener('keydown', e => {
  if (e.key === 'F5' || (e.ctrlKey && e.key === 'r') || (e.metaKey && e.key === 'r')) {
    e.preventDefault();
  }
});

// Warn user if they try to close or reload
window.addEventListener('beforeunload', e => {
  e.preventDefault();
  e.returnValue = '';
});

// Prevent drag-and-drop navigation
window.addEventListener('dragover', e => e.preventDefault());
window.addEventListener('drop', e => e.preventDefault());

// ===============================
// OPEN / CLOSE WINDOWS
// ===============================
function openWindow(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.remove("hidden");
  bringToFront(el);

  // Keep window inside viewport
  const rect = el.getBoundingClientRect();
  const maxLeft = window.innerWidth - rect.width;
  const maxTop = window.innerHeight - rect.height;
  if (rect.left > maxLeft) el.style.left = Math.max(0, maxLeft) + "px";
  if (rect.top > maxTop) el.style.top = Math.max(0, maxTop) + "px";
}

function closeWindow(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.add("hidden");
}

// -------------------------------
// Close buttons with class 'closewin'
document.addEventListener("DOMContentLoaded", () => {
  document.querySelectorAll(".closewin").forEach(btn => {
    btn.addEventListener("click", () => {
      const targetId = btn.dataset.target;
      if (targetId) closeWindow(targetId);
    });
  });
});

// ===============================
// DRAG SYSTEM
// ===============================
function makeDraggable(windowEl) {
  const header = windowEl.querySelector(".window-titlebar");
  if (!header) return;
  let isDragging = false;
  let offsetX = 0, offsetY = 0;

  header.addEventListener("pointerdown", e => {
    if (e.target.closest(".window-controls") || e.target.tagName === "BUTTON") return;
    isDragging = true;
    bringToFront(windowEl);

    const rect = windowEl.getBoundingClientRect();
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;

    document.addEventListener("pointermove", drag);
    document.addEventListener("pointerup", stopDrag);
  });

  function drag(e) {
    if (!isDragging) return;

    // Keep window inside viewport while dragging
    const maxX = window.innerWidth - windowEl.offsetWidth;
    const maxY = window.innerHeight - windowEl.offsetHeight;

    let newLeft = e.clientX - offsetX;
    let newTop = e.clientY - offsetY;

    newLeft = Math.max(0, Math.min(newLeft, maxX));
    newTop = Math.max(0, Math.min(newTop, maxY));

    windowEl.style.left = newLeft + "px";
    windowEl.style.top = newTop + "px";
  }

  function stopDrag() {
    isDragging = false;
    document.removeEventListener("pointermove", drag);
    document.removeEventListener("pointerup", stopDrag);
  }
}

// ===============================
// RESIZE SYSTEM
// ===============================
function makeResizable(windowEl) {
  const handles = windowEl.querySelectorAll(".resize-handle");
  handles.forEach(handle => {
    let isResizing = false;
    let startX, startY, startW, startH;

    handle.addEventListener("pointerdown", e => {
      e.preventDefault();
      isResizing = true;
      const rect = windowEl.getBoundingClientRect();
      startX = e.clientX; startY = e.clientY;
      startW = rect.width; startH = rect.height;
      bringToFront(windowEl);
      document.addEventListener("pointermove", resize);
      document.addEventListener("pointerup", stopResize);
    });

    function resize(e) {
      if (!isResizing) return;
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;

      const maxWidth = window.innerWidth - windowEl.offsetLeft;
      const maxHeight = window.innerHeight - windowEl.offsetTop;

      if (handle.classList.contains("resize-r") || handle.classList.contains("resize-br")) {
        windowEl.style.width = Math.max(200, Math.min(startW + dx, maxWidth)) + "px";
      }
      if (handle.classList.contains("resize-b") || handle.classList.contains("resize-br")) {
        windowEl.style.height = Math.max(150, Math.min(startH + dy, maxHeight)) + "px";
      }
    }

    function stopResize() {
      isResizing = false;
      document.removeEventListener("pointermove", resize);
      document.removeEventListener("pointerup", stopResize);
    }
  });
}

// ===============================
// INIT
// ===============================
document.addEventListener("DOMContentLoaded", () => {
  document.querySelectorAll(".appwindow").forEach(win => {
    makeDraggable(win);
    makeResizable(win);
  });
});

// ===============================
// CRASH LOGGER
// ===============================
function renderCrashLogs() {
  const list = document.getElementById("crashList");
  list.innerHTML = "";
  if (!window.CrashLogger) return;
  CrashLogger.logs.forEach(log => {
    const item = document.createElement("div");
    item.innerHTML = `<b>${log.source}</b> - ${log.time}<br>${log.message}`;
    list.appendChild(item);
  });
}

function clearCrashes() {
  if (!window.CrashLogger) return;
  CrashLogger.clear();
  renderCrashLogs();
}
</script>
<script src="js/crashlogger.js"></script>
</body>
</html>
