<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>19OS</title>
  <link rel="stylesheet" href="CSS/main.css">
</head>

<body>
<div id="desktop">

  <h2 class="title">19OS</h2>

  <!-- ================= WINDOWS ================= -->

  <!-- Calculator -->
  <div id="myApp" class="appwindow hidden">
    <div class="resize-handle resize-br"></div>
    <div class="resize-handle resize-r"></div>
    <div class="resize-handle resize-b"></div>

    <div class="window-titlebar">
      <span>Calculator</span>
      <div class="window-controls">
        <button class="win-btn close" data-action="close" data-window="myApp">×</button>
      </div>
    </div>

    <iframe src="Apps/com.calc.app/Index.html" class="window-content"></iframe>
  </div>

  <!-- Secret -->
  <div id="secret" class="appwindow hidden">
    <div class="resize-handle resize-br"></div>
    <div class="resize-handle resize-r"></div>
    <div class="resize-handle resize-b"></div>

    <div class="window-titlebar">
      <span>Secret Lang</span>
      <div class="window-controls">
        <button class="win-btn close" data-action="close" data-window="secret">×</button>
      </div>
    </div>

    <iframe src="Apps/com.os.secretlang/Index.html" class="window-content"></iframe>
  </div>

  <!-- Poki -->
  <div id="poki" class="appwindow hidden">
    <div class="resize-handle resize-br"></div>
    <div class="resize-handle resize-r"></div>
    <div class="resize-handle resize-b"></div>

    <div class="window-titlebar">
      <span>Poki</span>
      <div class="window-controls">
        <button class="win-btn close" data-action="close" data-window="poki">×</button>
      </div>
    </div>

    <iframe src="https://poki.com/" class="window-content"></iframe>
  </div>

  <!-- Crash Viewer -->
  <div id="crashViewer" class="appwindow hidden">
    <div class="resize-handle resize-br"></div>
    <div class="resize-handle resize-r"></div>
    <div class="resize-handle resize-b"></div>

    <div class="window-titlebar">
      <span>Crash Viewer</span>
      <div class="window-controls">
        <button class="win-btn close" data-action="close" data-window="crashViewer">✖</button>
      </div>
    </div>

    <div id="crashList"></div>
    <button onclick="clearCrashes()">Clear Logs</button>
  </div>

  <!-- ================= DOCK ================= -->
  <div class="dock glass">
    <button class="dock-icon" onclick="openWindow('myApp')">Calculator</button>
    <button class="dock-icon" onclick="openWindow('secret')">Secret</button>
    <button class="dock-icon" onclick="openWindow('poki')">Poki</button>
    <button class="dock-icon" onclick="openWindow('crashViewer')">Crash</button>
  </div>

</div>

<script>
// ===============================
// OPEN / CLOSE
// ===============================
function openWindow(id) {
  const el = document.getElementById(id);
  if (!el) return;

  el.classList.remove("hidden");
  el.style.display = "block";

  bringToFront(el);
}

function closeWindow(id) {
  const el = document.getElementById(id);
  if (!el) return;

  el.classList.add("hidden");
  el.style.display = "none";
}

// ===============================
// Z-INDEX
// ===============================
let zIndexCounter = 100;

function bringToFront(el) {
  zIndexCounter++;
  el.style.zIndex = zIndexCounter;
}

// ===============================
// DRAG SYSTEM (FIXED)
// ===============================
function makeDraggable(windowEl) {
  const header = windowEl.querySelector(".window-titlebar");
  if (!header) return;

  let isDragging = false;
  let offsetX = 0;
  let offsetY = 0;

  function startDrag(e) {
    // 🚫 prevent dragging when clicking buttons
    if (e.target.closest(".window-controls")) return;

    isDragging = true;
    bringToFront(windowEl);

    const rect = windowEl.getBoundingClientRect();
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;

    document.addEventListener("pointermove", drag);
    document.addEventListener("pointerup", stopDrag);
  }

  function drag(e) {
    if (!isDragging) return;

    windowEl.style.left = (e.clientX - offsetX) + "px";
    windowEl.style.top = (e.clientY - offsetY) + "px";
  }

  function stopDrag() {
    isDragging = false;
    document.removeEventListener("pointermove", drag);
    document.removeEventListener("pointerup", stopDrag);
  }

  header.addEventListener("pointerdown", startDrag);
}

// ===============================
// RESIZE SYSTEM (POINTER)
// ===============================
function makeResizable(windowEl) {
  const handles = windowEl.querySelectorAll(".resize-handle");

  handles.forEach(handle => {
    let isResizing = false;
    let startX, startY, startW, startH;

    function startResize(e) {
      isResizing = true;

      const rect = windowEl.getBoundingClientRect();
      startX = e.clientX;
      startY = e.clientY;
      startW = rect.width;
      startH = rect.height;

      document.addEventListener("pointermove", resize);
      document.addEventListener("pointerup", stopResize);
    }

    function resize(e) {
      if (!isResizing) return;

      let dx = e.clientX - startX;
      let dy = e.clientY - startY;

      if (handle.classList.contains("resize-r") || handle.classList.contains("resize-br")) {
        windowEl.style.width = Math.max(200, startW + dx) + "px";
      }

      if (handle.classList.contains("resize-b") || handle.classList.contains("resize-br")) {
        windowEl.style.height = Math.max(150, startH + dy) + "px";
      }
    }

    function stopResize() {
      isResizing = false;
      document.removeEventListener("pointermove", resize);
      document.removeEventListener("pointerup", stopResize);
    }

    handle.addEventListener("pointerdown", startResize);
  });
}

// ===============================
// BUTTON FIX (CRITICAL)
// ===============================
function initButtons() {
  document.querySelectorAll(".win-btn").forEach(btn => {
    btn.addEventListener("pointerdown", e => e.stopPropagation());

    btn.addEventListener("click", e => {
      e.stopPropagation();

      const action = btn.dataset.action;
      const id = btn.dataset.window;

      if (action === "close") closeWindow(id);
    });
  });
}

// ===============================
// INIT
// ===============================
document.addEventListener("DOMContentLoaded", () => {
  document.querySelectorAll(".appwindow").forEach(win => {
    makeDraggable(win);
    makeResizable(win);
  });

  initButtons();
});
</script>

<script src="js/crashlogger.js"></script>

<script>
function renderCrashLogs() {
  const list = document.getElementById("crashList");
  list.innerHTML = "";

  CrashLogger.logs.forEach(log => {
    const item = document.createElement("div");
    item.innerHTML = `<b>${log.source}</b> - ${log.time}<br>${log.message}`;
    list.appendChild(item);
  });
}

function clearCrashes() {
  CrashLogger.clear();
  renderCrashLogs();
}
</script>

</body>
</html>
