<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>19OS</title>
  <link rel="stylesheet" href="CSS/main.css">
</head>

<body>
<div id="desktop">

  <h2 class="title">19OS</h2>

  <!-- WINDOWS -->
  <div id="app1" class="appwindow hidden">
    <div class="titlebar">
      <span>App 1</span>
      <button class="close-btn" data-close="app1">✕</button>
    </div>
    <div class="content">Hello from App 1</div>
  </div>

  <div id="app2" class="appwindow hidden">
    <div class="titlebar">
      <span>App 2</span>
      <button class="close-btn" data-close="app2">✕</button>
    </div>
    <div class="content">Hello from App 2</div>
  </div>

  <!-- DOCK -->
  <div class="dock glass">
    <div class="dock-icon" data-open="app1">App1</div>
    <div class="dock-icon" data-open="app2">App2</div>
  </div>

</div>

<script src="js/moduleapps.js"></script>
</body>
</html>
