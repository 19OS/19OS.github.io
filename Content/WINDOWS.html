<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>19OS</title>
  <link rel="stylesheet" href="CSS/main.css">
</head>

<body>
<div id="desktop">
<h2 class="title">19OS</h2>

<!-- Calculator -->
<div id="myApp" class="appwindow hidden">
  <div class="resize-handle resize-br"></div>
  <div class="resize-handle resize-r"></div>
  <div class="resize-handle resize-b"></div>
  <div class="window-titlebar">
    <span>Calculator</span>
    <div class="window-controls">
      <button class="closewin" data-target="myApp">×</button>
    </div>
  </div>
  <iframe src="Apps/com.calc.app/Index.html" class="window-content"></iframe>
</div>

<!-- Secret Lang -->
<div id="secret" class="appwindow hidden">
  <div class="resize-handle resize-br"></div>
  <div class="resize-handle resize-r"></div>
  <div class="resize-handle resize-b"></div>
  <div class="window-titlebar">
    <span>Secret Lang</span>
    <div class="window-controls">
      <button class="closewin" data-target="secret">×</button>
    </div>
  </div>
  <iframe src="Apps/com.os.secretlang/Index.html" class="window-content"></iframe>
</div>

<!-- Poki -->
<div id="poki" class="appwindow hidden">
  <div class="resize-handle resize-br"></div>
  <div class="resize-handle resize-r"></div>
  <div class="resize-handle resize-b"></div>
  <div class="window-titlebar">
    <span>Poki</span>
    <div class="window-controls">
      <button class="closewin" data-target="poki">×</button>
    </div>
  </div>
  <iframe src="https://poki.com/" class="window-content"></iframe>
</div>

<!-- Crash Viewer -->
<div id="crashViewer" class="appwindow hidden">
  <div class="resize-handle resize-br"></div>
  <div class="resize-handle resize-r"></div>
  <div class="resize-handle resize-b"></div>
  <div class="window-titlebar">
    <span>Crash Viewer</span>
    <div class="window-controls">
      <button class="closewin" data-target="crashViewer">×</button>
    </div>
  </div>
  <div id="crashList"></div>
  <button onclick="clearCrashes()">Clear Logs</button>
</div>

<!-- Dock -->
<div class="dock glass">
  <button onclick="openWindow('myApp')">Calculator</button>
  <button onclick="openWindow('secret')">Secret</button>
  <button onclick="openWindow('poki')">Poki</button>
  <button onclick="openWindow('crashViewer')">Crash</button>
</div>
</div>

<script>
// ===============================
// JIGGLE PHYSICS CORE
// ===============================
function spring(val) {
  return { value: val, velocity: 0, target: val };
}

function step(s, k = 0.12, d = 0.75) {
  const force = (s.target - s.value) * k;
  s.velocity += force;
  s.velocity *= d;
  s.value += s.velocity;
}

// ===============================
// DRAG SYSTEM (JIGGLE + GPU)
// ===============================
function makeDraggable(win) {
  const header = win.querySelector(".window-titlebar");
  if (!header) return;

  let rect = win.getBoundingClientRect();

  let x = spring(rect.left);
  let y = spring(rect.top);

  let dragging = false;
  let offsetX = 0, offsetY = 0;

  header.addEventListener("pointerdown", e => {
    if (e.target.closest(".window-controls")) return;

    dragging = true;
    bringToFront(win);

    const r = win.getBoundingClientRect();
    offsetX = e.clientX - r.left;
    offsetY = e.clientY - r.top;

    x.target = r.left;
    y.target = r.top;

    win.setPointerCapture(e.pointerId);
    requestAnimationFrame(loop);
  });

  header.addEventListener("pointermove", e => {
    if (!dragging) return;

    x.target = e.clientX - offsetX;
    y.target = e.clientY - offsetY;
  });

  header.addEventListener("pointerup", e => {
    dragging = false;
    win.releasePointerCapture(e.pointerId);
  });

  function loop() {
    step(x);
    step(y);

    // subtle tilt
    const tilt = Math.max(-6, Math.min(6, x.velocity * 0.25));

    win.style.transform =
      `translate(${x.value}px, ${y.value}px) rotate(${tilt}deg)`;

    if (
      dragging ||
      Math.abs(x.velocity) > 0.1 ||
      Math.abs(y.velocity) > 0.1
    ) {
      requestAnimationFrame(loop);
    } else {
      win.style.transform =
        `translate(${x.value}px, ${y.value}px) rotate(0deg)`;
    }
  }
}

// ===============================
// RESIZE SYSTEM (JELLY)
// ===============================
function makeResizable(win) {
  const handles = win.querySelectorAll(".resize-handle");

  handles.forEach(handle => {
    let resizing = false;

    let w = spring(win.offsetWidth);
    let h = spring(win.offsetHeight);

    let startX, startY, startW, startH;

    handle.addEventListener("pointerdown", e => {
      e.preventDefault();
      resizing = true;

      const rect = win.getBoundingClientRect();

      startX = e.clientX;
      startY = e.clientY;
      startW = rect.width;
      startH = rect.height;

      w.target = startW;
      h.target = startH;

      win.setPointerCapture(e.pointerId);
      requestAnimationFrame(loop);
    });

    handle.addEventListener("pointermove", e => {
      if (!resizing) return;

      const dx = e.clientX - startX;
      const dy = e.clientY - startY;

      if (handle.classList.contains("resize-r") || handle.classList.contains("resize-br")) {
        w.target = Math.max(200, startW + dx);
      }

      if (handle.classList.contains("resize-b") || handle.classList.contains("resize-br")) {
        h.target = Math.max(150, startH + dy);
      }
    });

    handle.addEventListener("pointerup", e => {
      resizing = false;
      win.releasePointerCapture(e.pointerId);
    });

    function loop() {
      step(w, 0.15, 0.7);
      step(h, 0.15, 0.7);

      // stretch effect
      const stretchX = 1 + (w.velocity * 0.03);
      const stretchY = 1 + (h.velocity * 0.03);

      win.style.width = w.value + "px";
      win.style.height = h.value + "px";

      win.style.transform += ` scale(${stretchX}, ${stretchY})`;

      if (
        resizing ||
        Math.abs(w.velocity) > 0.1 ||
        Math.abs(h.velocity) > 0.1
      ) {
        requestAnimationFrame(loop);
      } else {
        win.style.transform = win.style.transform.replace(/scale\(.*?\)/, "");
      }
    }
  });
}

// ===============================
// INIT (KEEP THIS)
// ===============================
document.addEventListener("DOMContentLoaded", () => {
  document.querySelectorAll(".appwindow").forEach(win => {
    makeDraggable(win);
    makeResizable(win);

    // GPU boost
    win.style.willChange = "transform, width, height";
    win.style.transform = "translateZ(0)";
  });
});
</script>
<script src="js/crashlogger.js"></script>
</body>
</html>
