<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>19OS Browser</title>
<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #111;
  color: white;
}

/* Top bar */
.bar {
  display: flex;
  gap: 6px;
  padding: 8px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}

.bar input {
  flex: 1;
  padding: 6px;
  border-radius: 8px;
  border: none;
}

.bar button {
  padding: 6px 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

/* Tabs */
.tabs {
  display: flex;
  gap: 4px;
  padding: 6px;
  background: rgba(255,255,255,0.05);
}

.tab {
  padding: 4px 8px;
  background: rgba(255,255,255,0.1);
  border-radius: 6px;
  cursor: pointer;
}

/* View */
iframe {
  width: 100%;
  height: calc(100vh - 80px);
  border: none;
}
</style>
</head>

<body>

<div class="bar">
  <button onclick="goBack()">←</button>
  <button onclick="goForward()">→</button>
  <input id="url" placeholder="Enter URL or search...">
  <button onclick="loadURL()">Go</button>
  <button onclick="newTab()">+</button>
</div>

<div class="tabs" id="tabs"></div>

<iframe id="view"></iframe>

<script>
// ===============================
// 🌐 BROWSER CORE
// ===============================
let tabs = [];
let currentTab = 0;

function newTab(url = "https://example.com") {
  tabs.push({
    history: [url],
    index: 0
  });
  currentTab = tabs.length - 1;
  renderTabs();
  loadCurrent();
}

function loadURL() {
  let input = document.getElementById("url").value.trim();

  if (!input.startsWith("http")) {
    input = "https://www.google.com/search?q=" + encodeURIComponent(input);
    window.open(input, "_blank"); // fallback
    return;
  }

  const tab = tabs[currentTab];
  tab.history.push(input);
  tab.index++;
  loadCurrent();
}

function loadCurrent() {
  const tab = tabs[currentTab];
  const url = tab.history[tab.index];

  document.getElementById("url").value = url;

  const iframe = document.getElementById("view");

  // Try iframe
  iframe.src = url;

  // If blocked → fallback
  iframe.onerror = () => {
    window.open(url, "_blank");
  };
}

function goBack() {
  const tab = tabs[currentTab];
  if (tab.index > 0) {
    tab.index--;
    loadCurrent();
  }
}

function goForward() {
  const tab = tabs[currentTab];
  if (tab.index < tab.history.length - 1) {
    tab.index++;
    loadCurrent();
  }
}

function renderTabs() {
  const el = document.getElementById("tabs");
  el.innerHTML = "";

  tabs.forEach((t, i) => {
    const tab = document.createElement("div");
    tab.className = "tab";
    tab.innerText = "Tab " + (i + 1);

    tab.onclick = () => {
      currentTab = i;
      loadCurrent();
    };

    el.appendChild(tab);
  });
}

// Init
newTab();
</script>

</body>
</html>
